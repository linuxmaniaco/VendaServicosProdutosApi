name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package

      - name: Prepare JAR for Docker
        run: cp target/VendaServicosProdutosApi-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -f docker/Dockerfile -t linuxmaniaco/venda-servicos-produtos:latest .

      - name: Push image
        run: docker push linuxmaniaco/venda-servicos-produtos:latest

  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.235.165
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 20m
          script: |
            cd /docker/api-venda
            docker compose pull
            docker compose up -d
